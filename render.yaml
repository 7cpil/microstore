services:
  - type: web
    name: microstore
    runtime: node
    plan: free
    buildCommand: npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXTAUTH_URL
        value: https://microstore.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: microstore-db
          property: connectionString

databases:
  - name: microstore-db
    plan: free
    region: frankfurt
